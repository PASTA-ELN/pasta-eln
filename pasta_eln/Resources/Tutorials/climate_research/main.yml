title: The Last Climate Report
description: |
  The year is 2030. Four years ago, a government directive brought all official climate monitoring to an abrupt halt, leaving a critical gap in global temperature records. You are Clark Kent, scientific advisor to the nation’s last independent newspaper. Your mission is urgent: gather, verify, and consolidate all available climate data up to 2026 before it disappears from public access.

  Time is running out. This may become the final published account of recent climate trends.

  Note: While this scenario is fictional, all underlying data originates from https://www.jkclimate.fr and remains unaltered. For the purpose of this introductory tutorial, metadata has been removed, as building a custom extractor was beyond scope.
image: title.jpg
steps:
  - id: create_project
    title: Create a project
    instruction: Create a new project whose name includes "climate" and define a clear objective for it.
    help: On the home screen under "Project list", click "Add" and create a new project with the required name and objective.
    trigger:
      event: ADD_DOC
      docType: x0
      name: climate
      .objective: _non_empty_
  - id: create_task
    title: Create a task in the project
    instruction: Inside the project, create a folder (task) and rename it to include the word "temperature".
    help: Open the project by clicking on it. Select "Add folder" to create a new folder, then double-click the folder name to rename it.
    trigger:
      event: EDIT_DOC
      type: x1
      name: temperature
  - id: import_temperature
    title: Import temperature data
    instruction: Visit https://fz-juelich.sciebo.de/s/gCN7QEiqBQrA2Hp, download the dataset, and drag and drop all files into the new folder.
    help: |
      1. Open the website and download the files to your Downloads folder.
      2. Drag and drop all downloaded files into the temperature folder.
    trigger:
      event: DROP_EXTERNAL
      _count_: 6
  - id: inspect_data1
    title: Inspect the data and annotate faulty entries
    instruction: Review the dataset carefully. Identify faulty data, assign it one star, and add a comment describing your observation.
    help: |
      1. The dataset "ERA5" contains unusually high values, indicating a measurement error.
      2. Double-click the entry in the table, assign it one star, and write an explanatory comment.
    trigger:
      event: EDIT_DOC
      tags: _1
      comment: _non_empty_
  - id: inspect_data2
    title: Hide faulty data without deleting it
    instruction: Hide the faulty dataset while keeping it in the project.
    help: In table view, select the dataset and click "Selection → Invert hidden status of selected".
    trigger:
      event: HIDE_SHOW
  - id: write_report
    title: Export your findings to a report
    instruction: Generate an HTML report of the current project.
    help: Return to the project overview. In the top-right corner, click "More" and select the option to create an HTML report.
    trigger:
      event: TUTORIAL
      task: callAddOnInProject
